<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Sorti dans les graviers | Loïs</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #05060f;
      color: #e5e7eb;
      font-family: "Space Grotesk", "Segoe UI", system-ui, sans-serif;
      text-align: center;
      overflow: hidden;
    }
    .kerb {
      position: fixed;
      left: 0;
      right: 0;
      height: 10px;
      background: repeating-linear-gradient(90deg, #e10600 0 24px, #e5e7eb 24px 48px);
      opacity: 0.85;
    }
    .kerb.top { top: 0; }
    .kerb.bottom { bottom: 0; }
    .card { max-width: 620px; padding: 40px 24px; position: relative; z-index: 1; }
    .code {
      font-size: clamp(90px, 22vw, 160px);
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(90deg, #7c3aed, #22d3ee, #f472b6);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .car { font-size: 44px; display: inline-block; transform: scaleX(-1) rotate(12deg); }
    h1 { font-size: clamp(22px, 5vw, 32px); margin: 10px 0 12px; }
    p { color: #9ca3af; line-height: 1.6; font-size: 15px; }
    p.en { font-size: 13px; color: #6b7280; margin-top: 6px; }
    .mono { font-family: ui-monospace, monospace; letter-spacing: 0.25em; font-size: 11px; color: #6b7280; margin-bottom: 14px; }
    a.btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 28px;
      padding: 13px 26px;
      border-radius: 14px;
      background: linear-gradient(90deg, #7c3aed, #22d3ee);
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    a.btn:hover { transform: translateY(-2px); box-shadow: 0 0 24px rgba(34, 211, 238, 0.45); }
    .gravel { position: fixed; inset: 0; pointer-events: none; opacity: 0.25; }
    .gravel span { position: absolute; width: 4px; height: 4px; border-radius: 50%; background: #4b5563; }
  </style>
</head>
<body>
  <div class="kerb top"></div>
  <div class="kerb bottom"></div>
  <div class="gravel" aria-hidden="true">
    <span style="top:18%;left:12%"></span><span style="top:32%;left:78%"></span>
    <span style="top:64%;left:22%"></span><span style="top:71%;left:85%"></span>
    <span style="top:44%;left:52%"></span><span style="top:82%;left:41%"></span>
    <span style="top:24%;left:60%"></span><span style="top:58%;left:8%"></span>
  </div>
  <main class="card">
    <p class="mono">DRAPEAU JAUNE — SECTEUR INCONNU</p>
    <div class="code">4<span class="car">🏎️</span>4</div>
    <h1>Tout droit dans les graviers !</h1>
    <p>Cette page n'existe pas (ou a été retirée au drapeau noir).<br />Le circuit continue de l'autre côté.</p>
    <p class="en">This page went straight into the gravel trap — it doesn't exist.</p>
    <a class="btn" href="/">← Retour aux stands</a>
  </main>
</body>
</html>
